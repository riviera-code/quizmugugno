<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta Tag per WhatsApp e Social -->
    <title>Quiz del Mugugno - Bordighera Domani 2026</title>
    <meta name="description" content="Mettiti alla prova: quanto conosci davvero i problemi e le segnalazioni dei cittadini di Bordighera? 20 domande a risposta multipla.">
    <meta property="og:title" content="Quiz del Mugugno - Bordighera Domani 2026">
    <meta property="og:description" content="Mettiti alla prova: quanto conosci davvero i problemi e le segnalazioni dei cittadini di Bordighera?">
    <meta property="og:image" content="https://github.com/riviera-code/quizmugugno/blob/main/Bordighera-domani.png?raw=true">
    <meta property="og:type" content="website">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-quiz { animation: fadeIn 0.4s ease-out forwards; }
        .logo-container { background: white; padding: 8px; }
        .no-select { user-select: none; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .arcade-btn:active { transform: translateY(2px); filter: brightness(1.2); }
    </style>
</head>
<body class="bg-slate-50 font-sans no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LOGO_URL = "https://github.com/riviera-code/quizmugugno/blob/main/Bordighera-domani.png?raw=true"; 
        const SECRET_PASSWORD = "BordigheraDomani2026";

        // Quiz Data con 20 domande e 5 opzioni (spalmate casualmente)
        const quizData = [
            { id: 1, q: "Qual è la criticità più frequente sulla gestione rifiuti (RSU)?", options: ["Costo eccessivo TARI", "Mancanza di cestini", "Inefficienza sistema tessere e scomodità", "Pochi passaggi estivi", "Nessuna delle precedenti"], correct: 2 },
            { id: 2, q: "Cosa chiedono i cittadini per il rilancio del lungomare?", options: ["Aumento dei dehors", "La pedonalizzazione completa", "Più stabilimenti privati", "Nuovi parcheggi sulla spiaggia", "Nessuna delle precedenti"], correct: 1 },
            { id: 3, q: "Quale problema affligge i locali commerciali del centro?", options: ["Affitti troppo bassi", "Eccesso di rumore notturno", "Aumento eccessivo della criminalità", "Scarsità di prodotti locali", "Nessuna delle precedenti"], correct: 4 }, // Corretta: Nessuna (Negozi chiusi/vetrine vuote)
            { id: 4, q: "Lamentela principale sulla manutenzione marciapiedi?", options: ["Sono troppo larghi", "Colore pavimentazione", "Mancanza di illuminazione radente", "Sconnessi, pericolosi e sporchi", "Nessuna delle precedenti"], correct: 3 },
            { id: 5, q: "Zona critica per parcheggio causa sport serali?", options: ["Bordighera Alta", "Corso Europa", "Arziglia", "Zona Porto", "Nessuna delle precedenti"], correct: 4 }, // Corretta: Nessuna (Via Pasteur/Piazza Morlotti)
            { id: 6, q: "Potenziale sede per un centro culturale annuale?", options: ["Palazzo del Parco", "Mercato Coperto", "Ex Cinema Olimpia", "Sede dei Vigili", "Nessuna delle precedenti"], correct: 0 },
            { id: 7, q: "L'eccellenza naturale 'intoccabile' di Bordighera?", options: ["Le spiagge di sassi", "Il clima mite e il paesaggio", "Il sentiero del Beodo", "La scogliera di Sant'Ampelio", "Nessuna delle precedenti"], correct: 1 },
            { id: 8, q: "Critica principale alla mensa scolastica?", options: ["Porzioni abbondanti", "Orari dei pasti", "Scarsa qualità (massimo ribasso)", "Mancanza opzioni bio", "Nessuna delle precedenti"], correct: 2 },
            { id: 9, q: "Cosa chiedono per Via Romana e periferie?", options: ["Nuovi dossi", "Più telecamere", "Rifacimento asfalto", "Migliore illuminazione pubblica", "Nessuna delle precedenti"], correct: 3 },
            { id: 10, q: "Cosa si propone per incentivare l'uso della bicicletta?", options: ["Noleggio bici comunale economico", "Più piste ciclabili alte", "Rastrelliere ovunque", "ZTL per le auto", "Nessuna delle precedenti"], correct: 0 },
            { id: 11, q: "Cosa chiedono i residenti riguardo ai Vigili Urbani?", options: ["Meno multe per divieto", "Presenza fisica a piedi e marciapiedi", "Più pattuglie in auto", "Più uffici aperti", "Nessuna delle precedenti"], correct: 1 },
            { id: 12, q: "Quale eccellenza culturale è citata per l'importanza educativa?", options: ["Teatro della Concordia", "Il Museo Bicknell", "Villa Regina Margherita", "La Biblioteca Civica", "Nessuna delle precedenti"], correct: 3 },
            { id: 13, q: "Cosa suggeriscono per i parcheggi in centro oltre alla superficie?", options: ["Eliminare le strisce blu", "Bus navetta gratuito", "Permessi solo ai residenti", "Nuovi silos fuori città", "Nessuna delle precedenti"], correct: 4 }, // Corretta: Nessuna (Parcheggi sotterranei)
            { id: 14, q: "Quale sentimento prevale sul declino della città?", options: ["Rabbia e aggressività", "Indifferenza totale", "Tristezza e malinconia", "Speranza immediata", "Nessuna delle precedenti"], correct: 2 },
            { id: 15, q: "Iniziativa proposta per aiutare le famiglie in difficoltà?", options: ["Bonus spesa mensili", "Nuovi asili nido privati", "Esonero tasse comunali", "Ascolto servizi sociali e supporto bambini", "Nessuna delle precedenti"], correct: 3 },
            { id: 16, q: "Che tipo di turismo si vorrebbe incentivare oltre al balneare?", options: ["Turismo crocieristico", "Turismo d'affari", "Parchi a tema", "Culturale, sportivo e invernale", "Nessuna delle precedenti"], correct: 3 },
            { id: 17, q: "Quale elemento del lungomare è considerato 'inviolabile'?", options: ["I chioschi storici", "Il muraglione", "La rotonda di Sant'Ampelio", "L'area cani", "Nessuna delle precedenti"], correct: 4 }, // Corretta: Nessuna (Araucarie)
            { id: 18, q: "Cosa si suggerisce per contrastare l'accattonaggio molesto?", options: ["Maggiore controllo delle forze dell'ordine", "Zone interdette ai non residenti", "Aiuti economici diretti", "Campagna di sensibilizzazione", "Nessuna delle precedenti"], correct: 0 },
            { id: 19, q: "Quale termine usano i cittadini per descrivere l'attuale gestione?", options: ["Poca lungimiranza", "Mancanza di ascolto e arroganza", "Troppa burocrazia", "Mancanza di fondi", "Nessuna delle precedenti"], correct: 1 },
            { id: 20, q: "Obiettivo principale di un programma per il domani?", options: ["Fare eventi ogni weekend", "Riparare solo le buche", "Visione con obiettivi chiari a breve/medio/lungo termine", "Abbassare l'età dei consiglieri", "Nessuna delle precedenti"], correct: 2 }
        ];

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                chevron: <path d="m9 18 6-6-6-6"/>,
                lock: <path d="M15 22H9a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3zM7 11V7a5 5 0 0 1 10 0v4"/>,
                eyeOff: <path d="M9.88 9.88L9 9m-5 3a9 9 0 0 1 8-5 9 9 0 0 1 8 5 9 9 0 0 1-8 5 9 9 0 0 1-8-5zM2 2l20 20M12 15a3 3 0 1 0-3-3"/>,
                check: <path d="M20 6 9 17l-5-5"/>,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>,
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/>,
                settings: (
                    <React.Fragment>
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </React.Fragment>
                ),
                volume: <path d="M11 5 6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>,
                volumeX: <path d="M11 5 6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const LogoBordighera = ({ className = "w-24 h-24" }) => (
            <div className={`${className} mx-auto logo-container rounded-full shadow-md flex items-center justify-center overflow-hidden bg-white`}>
                <img src={LOGO_URL} alt="Logo" className="w-full h-full object-contain scale-110" />
            </div>
        );

        function App() {
            const [view, setView] = useState('register');
            const [playerName, setPlayerName] = useState('');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [localLeaderboard, setLocalLeaderboard] = useState([]);
            const [passInput, setPassInput] = useState('');
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [soundEnabled, setSoundEnabled] = useState(true);
            
            const audioCtxRef = useRef(null);

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('bordi_leaderboard') || '[]');
                setLocalLeaderboard(saved);
                const hasPlayed = localStorage.getItem('bordi_quiz_played');
                if (hasPlayed && view === 'register') setView('leaderboard');
            }, []);

            const getAudioCtx = async () => {
                if (!audioCtxRef.current) {
                    audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtxRef.current.state === "suspended") {
                    await audioCtxRef.current.resume();
                }
                return audioCtxRef.current;
            };

            const triggerSound = async (type) => {
                if (!soundEnabled) return;
                
                const ctx = await getAudioCtx();
                const masterGain = ctx.createGain();
                masterGain.gain.value = 0.08;
                masterGain.connect(ctx.destination);

                const playNote = (freq, start, duration, wave = 'square') => {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.type = wave;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
                    g.gain.setValueAtTime(0.08, ctx.currentTime + start);
                    g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + start + duration);
                    osc.connect(g);
                    g.connect(masterGain);
                    osc.start(ctx.currentTime + start);
                    osc.stop(ctx.currentTime + start + duration);
                };

                switch(type) {
                    case 'start':
                        playNote(261.63, 0, 0.1); playNote(329.63, 0.1, 0.1); playNote(392.00, 0.2, 0.3);
                        break;
                    case 'select':
                        playNote(600, 0, 0.05, 'sine');
                        break;
                    case 'correct':
                        playNote(523.25, 0, 0.1); playNote(659.25, 0.1, 0.2);
                        break;
                    case 'wrong':
                        playNote(220, 0, 0.1); playNote(180, 0.1, 0.3);
                        break;
                    case 'finish':
                        [523, 659, 783, 1046].forEach((f, i) => playNote(f, i * 0.1, 0.4, 'triangle'));
                        break;
                }
            };

            const finishQuiz = (finalScore) => {
                triggerSound('finish');
                const newEntry = { 
                    id: Date.now(),
                    name: playerName, 
                    score: finalScore, 
                    date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
                };
                const updated = [...localLeaderboard, newEntry].sort((a, b) => b.score - a.score);
                setLocalLeaderboard(updated);
                localStorage.setItem('bordi_leaderboard', JSON.stringify(updated));
                localStorage.setItem('bordi_quiz_played', 'true');
                setView('results');
            };

            const handleAnswer = (idx) => {
                const isCorrect = idx === quizData[currentQuestion].correct;
                triggerSound(isCorrect ? 'correct' : 'wrong');
                
                const newScore = isCorrect ? score + 1 : score;
                setScore(newScore);
                
                if (currentQuestion < quizData.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    finishQuiz(newScore);
                }
            };

            const checkPassword = () => {
                triggerSound('select');
                if (passInput === SECRET_PASSWORD) { 
                    setIsUnlocked(true); 
                    setErrorMsg(''); 
                } else { 
                    setErrorMsg('Codice errato.'); 
                    setPassInput(''); 
                }
            };

            const startQuiz = () => {
                if (playerName.length >= 3) {
                    triggerSound('start');
                    setView('quiz');
                }
            };

            const deleteEntry = (id) => {
                triggerSound('wrong');
                const up = localLeaderboard.filter(e => e.id !== id);
                setLocalLeaderboard(up);
                localStorage.setItem('bordi_leaderboard', JSON.stringify(up));
                localStorage.removeItem('bordi_quiz_played');
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    {/* Toggle Audio Global */}
                    <button 
                        onClick={() => setSoundEnabled(!soundEnabled)}
                        className="fixed top-4 left-4 p-3 bg-white shadow-md rounded-full text-slate-400 hover:text-blue-600 transition-all z-50"
                    >
                        <Icon name={soundEnabled ? "volume" : "volumeX"} className="w-6 h-6" />
                    </button>

                    {view === 'register' && (
                        <div className="max-w-sm w-full text-center animate-quiz relative">
                            <button onClick={() => { triggerSound('select'); setView('leaderboard'); }} className="absolute -top-12 -right-4 p-2 text-slate-300 hover:text-blue-500 transition-colors">
                                <Icon name="settings" className="w-5 h-5" />
                            </button>

                            <LogoBordighera className="w-32 h-32 mb-6" />
                            <h1 className="text-3xl font-black text-blue-900 mb-1 tracking-tighter uppercase leading-none">Bordighera Domani</h1>
                            <div className="h-1 w-16 bg-blue-600 mx-auto mb-4 rounded-full mt-2"></div>
                            <p className="text-slate-600 mb-8 font-medium italic">"Conosci davvero il Mugugno cittadino?"</p>
                            <input 
                                type="text" 
                                placeholder="Nome e Cognome del Candidato" 
                                className="w-full px-4 py-4 mb-4 bg-white border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none shadow-sm font-bold" 
                                value={playerName} 
                                onChange={(e) => setPlayerName(e.target.value)} 
                            />
                            <button onClick={startQuiz} disabled={playerName.length < 3} className="arcade-btn w-full py-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white rounded-2xl font-bold text-lg shadow-lg transition-all">
                                Inizia il Test
                            </button>
                            <p className="mt-8 text-[10px] text-slate-400 uppercase font-bold tracking-widest tracking-[0.2em]">Area Riservata Candidati</p>
                        </div>
                    )}

                    {view === 'quiz' && (
                        <div className="max-w-2xl w-full animate-quiz">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center space-x-3">
                                    <img src={LOGO_URL} className="w-8 h-8 object-contain" alt="mini logo" />
                                    <span className="text-xs font-black text-blue-900 uppercase tracking-widest font-bold">Domanda {currentQuestion + 1}/{quizData.length}</span>
                                </div>
                                <span className="text-[10px] font-black text-slate-300 uppercase italic">Punteggio Secretato</span>
                            </div>
                            <div className="w-full bg-slate-200 h-2 rounded-full mb-8 overflow-hidden">
                                <div className="h-full bg-blue-600 rounded-full transition-all duration-500 shadow-[0_0_10px_rgba(37,99,235,0.5)]" style={{ width: `${((currentQuestion + 1)/quizData.length)*100}%`}}></div>
                            </div>
                            <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-8 leading-tight">{quizData[currentQuestion].q}</h2>
                            <div className="grid gap-3">
                                {quizData[currentQuestion].options.map((opt, idx) => (
                                    <button key={idx} onClick={() => handleAnswer(idx)} className="arcade-btn w-full p-4 md:p-5 text-left bg-white border-2 border-slate-100 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all flex justify-between items-center group shadow-sm">
                                        <span className="font-medium text-slate-700 group-hover:text-blue-700 leading-snug">{opt}</span>
                                        <Icon name="chevron" className="text-slate-300 group-hover:text-blue-500 w-5 h-5 flex-shrink-0" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'results' && (
                        <div className="max-w-sm w-full text-center animate-quiz">
                            <LogoBordighera className="w-24 h-24 mb-6" />
                            <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <Icon name="check" className="w-10 h-10 text-green-600" />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2 uppercase tracking-tighter">Test Ultimato</h2>
                            <p className="text-slate-600 mb-8 leading-relaxed italic">"Ottimo lavoro {playerName.split(' ')[0]}, il tuo test è stato acquisito con successo!"</p>
                            <div className="p-6 bg-slate-900 rounded-3xl mb-8 border border-slate-700 shadow-inner">
                                <Icon name="eyeOff" className="mx-auto mb-2 text-slate-600 w-8 h-8" />
                                <p className="text-xs font-black text-slate-300 tracking-widest">RISULTATO SECRETATO</p>
                                <p className="text-[10px] text-slate-500 mt-2 uppercase">I dati reali sono disponibili solo in Archivio Admin</p>
                            </div>
                            <button onClick={() => { triggerSound('select'); setView('leaderboard'); }} className="arcade-btn w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center transition-transform">
                                <Icon name="lock" className="w-4 h-4 mr-2" /> Archivio Admin
                            </button>
                        </div>
                    )}

                    {view === 'leaderboard' && (
                        <div className="max-w-md w-full animate-quiz">
                            {!isUnlocked ? (
                                <div className="text-center py-8">
                                    <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Icon name="shield" className="w-8 h-8 text-blue-600" />
                                    </div>
                                    <h2 className="text-xl font-bold mb-6 text-slate-800 uppercase tracking-tighter">Login Amministratore</h2>
                                    <input type="password" placeholder="Passcode Segreto" className="w-full px-4 py-4 mb-4 bg-white border-2 border-slate-100 rounded-2xl text-center text-xl tracking-widest font-mono shadow-inner" value={passInput} onChange={(e) => setPassInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && checkPassword()} />
                                    {errorMsg && <p className="text-red-500 text-xs mb-4 font-bold tracking-tight">{errorMsg}</p>}
                                    <div className="flex gap-2">
                                        <button onClick={() => { triggerSound('select'); setView('register'); }} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold">Esci</button>
                                        <button onClick={checkPassword} className="flex-[2] py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-xl">Sblocca</button>
                                    </div>
                                </div>
                            ) : (
                                <div>
                                    <div className="flex justify-between items-end mb-8">
                                        <div>
                                            <h2 className="text-2xl font-black text-blue-900 uppercase leading-none tracking-tighter">Graduatoria</h2>
                                            <p className="text-[10px] text-slate-400 font-bold tracking-widest uppercase mt-1 italic">Gestione Candidati - Bordighera Domani</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => { triggerSound('select'); setView('register'); }} className="bg-blue-50 p-2 rounded-xl text-blue-600 hover:bg-blue-100"><Icon name="logout" className="w-5 h-5" /></button>
                                            <button onClick={() => { triggerSound('select'); setIsUnlocked(false); }} className="bg-slate-100 p-2 rounded-xl text-slate-400"><Icon name="lock" className="w-5 h-5" /></button>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100 max-h-[60vh] overflow-y-auto custom-scroll">
                                        {localLeaderboard.map((entry, idx) => (
                                            <div key={entry.id || idx} className="flex items-center justify-between p-5 border-b border-slate-50 last:border-0 hover:bg-blue-50/30 transition-colors group">
                                                <div className="flex items-center space-x-4">
                                                    <span className={`w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black ${idx === 0 ? 'bg-yellow-400 text-white' : idx === 1 ? 'bg-slate-300 text-white' : idx === 2 ? 'bg-orange-300 text-white' : 'bg-slate-100 text-slate-400'}`}>{idx+1}</span>
                                                    <div>
                                                        <p className="font-bold text-slate-800 text-sm uppercase leading-none">{entry.name}</p>
                                                        <p className="text-[10px] text-slate-400 mt-1 font-medium italic">{entry.date}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="flex items-baseline space-x-0.5 font-black text-blue-600 text-lg">{entry.score}<span className="text-[10px] font-bold text-slate-300 uppercase ml-0.5">pt</span></div>
                                                    <button onClick={() => deleteEntry(entry.id)} className="p-2 text-slate-200 hover:text-red-500 transition-colors"><Icon name="trash" className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        ))}
                                        {localLeaderboard.length === 0 && (
                                            <div className="p-12 text-center text-slate-300 font-medium italic">Nessun dato registrato.</div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
